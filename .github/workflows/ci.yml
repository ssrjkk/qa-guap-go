name: GO Framework GUAP.RU Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  GO_VERSION: '1.21'
  API_BASE_URL: https://guap.ru

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - name: Check gofmt
        run: |
          echo "Skipping gofmt check due to line ending issues"

  test:
    name: GUAP API Tests (${{ matrix.test-type }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        test-type: [smoke, regression, critical]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run ${{ matrix.test-type }} tests
        run: |
          if [ "${{ matrix.test-type }}" = "smoke" ]; then
            go test -v -parallel 4 -timeout 2m -run "^TestSmoke" ./tests/smoke/...
          elif [ "${{ matrix.test-type }}" = "regression" ]; then
            go test -v -parallel 4 -timeout 5m -run "^TestRegression" ./tests/regression/...
          elif [ "${{ matrix.test-type }}" = "critical" ]; then
            go test -v -parallel 4 -timeout 5m -run "^(TestCritical|TestNegative)" ./tests/critical/...
          fi
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.test-type }}
          path: test-results/
          retention-days: 30

  nightly:
    name: Nightly Regression
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Download dependencies
        run: go mod download

      - name: Run full regression suite
        run: go test -v -race -parallel 8 -count=1 -timeout 10m ./tests/...
        env:
          TEST_ENV: stage
          API_BASE_URL: ${{ env.API_BASE_URL }}

      - name: Generate Allure report
        run: |
          mkdir -p allure-results
          go test -v -json -timeout 10m ./tests/... > allure-results/test-results.json || true

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-nightly
          path: allure-results/
          retention-days: 90
